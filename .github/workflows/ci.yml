name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # 표 이미지 렌더링 테스트용 한글 폰트 (table_image._FONT_CANDIDATES 리눅스 경로)
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-nanum
      - run: uv sync --frozen
      # live 마커는 pyproject addopts(-m 'not live')로 기본 제외 — 오프라인 실행
      - run: uv run pytest

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # raw postgresql:// 로 주입 — env.py 의 normalize_db_url(asyncpg 정규화)을 실연결로 검증
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run alembic check
