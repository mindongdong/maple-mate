# Alembic 설정. sqlalchemy.url 은 비워두고 env.py 가 .env 의 DATABASE_URL 을 주입한다.
[alembic]
script_location = maple_mate/alembic
prepend_sys_path = .
path_separator = os
# sqlalchemy.url = (env.py 에서 DATABASE_URL 로 설정)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
